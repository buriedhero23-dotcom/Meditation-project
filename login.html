<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in | Meditation Space</title>
  <meta
    name="description"
    content="Log in to your Meditation Space account and return to your calm practice."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
  />
  <link rel="stylesheet" href="style/login.css">
</head>

<body class="light-theme">
  <button
    class="theme-toggle"
    id="themeToggle"
    type="button"
    aria-label="Toggle theme"
  >
    🌙
  </button>

  <main class="auth-page">
    <section class="auth-shell" aria-labelledby="login-title">
      <a href="index.html" class="auth-back-link">
        <i class="fas fa-arrow-left" aria-hidden="true"></i>
        <span>Back to homepage</span>
      </a>

      <div class="auth-card">
        <div class="auth-card__header">
          <span class="auth-card__eyebrow">Meditation Space</span>
          <h1 class="auth-card__title" id="login-title">Log in</h1>
          <p class="auth-card__subtitle">
            Return to your calm space and continue your meditation practice.
          </p>
        </div>

        <form class="auth-form" action="#" method="post" novalidate>
          <div class="auth-form__group">
            <label class="auth-form__label" for="email">Email</label>
            <input
              class="auth-form__input"
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              autocomplete="email"
              required
            />
          </div>

          <div class="auth-form__group">
            <label class="auth-form__label" for="password">Password</label>
            <input
              class="auth-form__input"
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>

          <button class="auth-form__submit btn btn-primary" type="submit">
            Log in
          </button>

          <div
            class="auth-error auth-error--hidden"
            role="alert"
            aria-live="polite"
          >
            <p class="auth-error-text">Invalid email or password</p>
            <a class="forgot-password-link" href="forgot-password.html">Forgot password?</a>
          </div>
        </form>

        <p class="auth-card__footer">
          Don't have an account?
          <a href="registration-page.html" class="auth-card__link">
            Create account
          </a>
        </p>
      </div>
    </section>
  </main>
</body>

<script src="scripts/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="scripts/supabase-client.js"></script>
<script src="scripts/login.js"></script>
</html>
