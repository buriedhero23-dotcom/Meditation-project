<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset password | Meditation Space</title>
  <meta name="description" content="Request a password reset link for your Meditation Space account." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

  <!-- Reuse project variables and base auth styles then layer page-specific rules -->
  <link rel="stylesheet" href="style/login.css" />
  <link rel="stylesheet" href="style/forgot-password.css" />
</head>

<body class="light-theme">
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">🌙</button>

  <main class="auth-page">
    <section class="auth-shell" aria-labelledby="reset-title">
      <a href="login.html" class="auth-back-link">
        <i class="fas fa-arrow-left" aria-hidden="true"></i>
        <span>Back to login</span>
      </a>

      <div class="auth-card reset-card">
        <div class="auth-card__header">
          <span class="auth-card__eyebrow">Meditation Space</span>
          <h1 class="auth-card__title" id="reset-title">Reset your password</h1>
          <p class="auth-card__subtitle">Enter your email and we’ll send you a link to create a new password.</p>
        </div>

        <form class="password-reset-form" action="#" method="post" novalidate>
          <div class="auth-form__group">
            <label class="auth-form__label" for="resetEmail">Email</label>
            <input class="auth-form__input" type="email" id="resetEmail" name="email" placeholder="name@domain.com" autocomplete="email" required />
          </div>

          <button class="reset-submit-btn btn btn-primary" type="submit">Send reset link</button>

          <p class="reset-message reset-message--hidden" role="status" aria-live="polite"></p>
        </form>

        <p class="auth-card__footer">
          Remembered your password?
          <a href="login.html" class="auth-card__link">Back to login</a>
        </p>
      </div>
    </section>
  </main>

  <script src="scripts/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/supabase-client.js"></script>
  <script src="scripts/forgot-password.js"></script>
</body>
</html>
