<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Медитационная сессия</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="style/meditation-page.css" />
</head>
<body class="light-theme">
  <div class="user-panel" aria-label="User account">
    <div class="user-avatar" aria-hidden="true">B</div>
    <span class="user-name">Biba Ziba</span>
    <button class="user-menu-btn" type="button" aria-label="Open user menu">
      <i class="fas fa-chevron-down" aria-hidden="true"></i>
    </button>

    <div class="user-dropdown hidden">
      <a href="profile.html" class="user-dropdown-item">My profile</a>
      <button class="user-dropdown-item logout-btn" type="button">Log out</button>
      <a href="faq.html" class="user-dropdown-item">FAQ</a>
    </div>
  </div>

  <button class="theme-toggle" id="themeToggle" type="button">
  <i class="fas fa-moon"></i>
</button>

  <div class="player-container">
    <nav class="top-nav">
      <a href="index.html" class="nav-btn">
        <i class="fas fa-home"></i>
        <span class="nav-text">На главную</span>
      </a>
      <a href="#" class="nav-btn">
        <i class="fas fa-clock"></i>
        <span class="nav-text">Таймер</span>
      </a>
      <a href="#" id="speakerToggleBtn" class="nav-btn" aria-pressed="false">
        <i class="fas fa-user-plus"></i>
        <span class="nav-text">Добавить спикера</span>
      </a>
    </nav>

    <div class="player-card">
      <img class="bg-flower-left" src="style/meditation-page-images/dark-theme-flowers-left.png" alt="Decorative flower left" />
      <img class="bg-flower-right" src="style/meditation-page-images/dark-theme-flowers-right.png" alt="Decorative flower right" />

      <div class="track-info">
        <h2 id="trackTitle">Loading...</h2>
      </div>

      <div class="controls">
        <button id="prevBtn" class="control-btn">
          <i class="fas fa-step-backward"></i>
        </button>

        <button id="playPauseBtn" class="control-btn play-btn">
          <i class="fas fa-play"></i>
        </button>

        <button id="nextBtn" class="control-btn">
          <i class="fas fa-step-forward"></i>
        </button>
      </div>

      <div class="progress-section">
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>

      <div class="volume-section">
        <i class="fas fa-volume-up volume-icon"></i>
        <input
          type="range"
          id="volumeSlider"
          min="0"
          max="1"
          step="0.01"
          value="0.5"
          class="volume-slider"
        />
      </div>

      <div class="voice-volume-group hidden" id="voiceVolumeGroup">
        <i class="fas fa-comment-dots narrator-icon volume-icon" aria-hidden="true"></i>
        <input
          type="range"
          id="voiceVolumeSlider"
          min="0"
          max="1"
          step="0.01"
          value="0.5"
          class="volume-slider"
        />
      </div>

      <audio id="meditationAudio" preload="metadata"></audio>
      <audio id="voiceAudio" preload="metadata"></audio>
    </div>
  </div>
</body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/supabase-client.js"></script>
  <script src="scripts/guard.js"></script>
  <script src="scripts/session-ui.js"></script>

  <script src="scripts/theme.js"></script>
  <script src="scripts/player.js"></script>
</html>
