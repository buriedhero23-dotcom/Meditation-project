<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create new password | Meditation Space</title>
  <meta name="description" content="Create a new password for your Meditation Space account." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />

  <link rel="stylesheet" href="style/login.css" />
  <link rel="stylesheet" href="style/reset-password.css" />
</head>

<body class="light-theme">
  <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">🌙</button>

  <main class="auth-page">
    <section class="auth-shell" aria-labelledby="create-title">
      <a href="login.html" class="auth-back-link">
        <i class="fas fa-arrow-left" aria-hidden="true"></i>
        <span>Back to login</span>
      </a>

      <div class="auth-card reset-card">
        <div class="auth-card__header">
          <span class="auth-card__eyebrow">Meditation Space</span>
          <h1 class="auth-card__title" id="create-title">Create new password</h1>
          <p class="auth-card__subtitle">Enter your new password to continue your meditation journey.</p>
        </div>

        <form class="reset-password-form" action="#" method="post" novalidate>
          <div class="auth-form__group">
            <label class="auth-form__label" for="newPassword">New password</label>
            <input class="auth-form__input" type="password" id="newPassword" name="newPassword" placeholder="Enter new password" autocomplete="new-password" required />
          </div>

          <div class="auth-form__group">
            <label class="auth-form__label" for="confirmPassword">Confirm password</label>
            <input class="auth-form__input" type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" autocomplete="new-password" required />
          </div>

          <button class="reset-submit-btn btn btn-primary" type="submit">Create password</button>

          <p class="reset-message reset-message--hidden" role="status" aria-live="polite"></p>
        </form>

        <p class="auth-card__footer">
          Remembered your password?
          <a href="login.html" class="auth-card__link">Back to login</a>
        </p>
      </div>
    </section>
  </main>

  <script src="scripts/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="scripts/supabase-client.js"></script>
  <script src="scripts/reset-password.js"></script>
</body>
</html>
